<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radio — Sign in</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 0.4rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; }
    .sub { color: #555; font-size: 0.85rem; margin-bottom: 1.5rem; }
    form {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      width: 100%;
      max-width: 300px;
    }
    input {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #eee;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #1db954; }
    button {
      background: #1db954;
      border: none;
      border-radius: 6px;
      color: #000;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem;
      margin-top: 0.2rem;
      transition: background 0.15s;
    }
    button:hover { background: #1ed760; }
    #error { color: #e05252; font-size: 0.8rem; text-align: center; min-height: 1rem; }
  </style>
</head>
<body>
  <h1>Radio</h1>
  <p class="sub">Sign in with your Matrix account</p>
  <form method="post" action="/auth/login">
    <input name="username" type="text" placeholder="@you:server.com" autocomplete="username" required>
    <input name="password" type="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
    <p id="error"></p>
  </form>
  <script>
    const msg = new URLSearchParams(location.search).get('error');
    if (msg) document.getElementById('error').textContent = decodeURIComponent(msg);
  </script>
</body>
</html>
