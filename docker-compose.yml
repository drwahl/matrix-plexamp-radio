services:
  radio-station:
    build: src/
    env_file: .env
    ports:
      - "${RADIO_WEB_PORT:-8080}:80"
    volumes:
      - "${MUSIC_PATH}:/music:ro"
      - radio-data:/data
    restart: unless-stopped

  # Optional bundled Ollama — start with: docker-compose --profile ai up
  # Set AI_MODEL=ollama/${OLLAMA_MODEL:-qwen2.5:3b} and AI_BASE_URL=http://ollama:11434 in .env
  ollama:
    image: ollama/ollama
    profiles: [ai]
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    entrypoint: >
      sh -c "ollama serve &
             until ollama list >/dev/null 2>&1; do sleep 1; done &&
             ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} &&
             wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  radio-data:
  ollama-data:
